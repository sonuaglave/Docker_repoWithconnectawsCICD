version: 0.2

phases:
  install:
    runtime-versions:
      docker: 20
    commands:
      - echo Installing dependencies...

  pre_build:
    commands:
      - echo Logging in to Amazon ECR (optional if pushing image)

  build:
    commands:
      - echo Building Docker image...
      - docker build -t myapp .

  post_build:
    commands:
      - echo Running Docker container...
      - docker run myapp
